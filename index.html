<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARIA — AI Receptionist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #070b12;
      --surface: #0d1420;
      --surface2: #111c2e;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #0099bb;
      --green: #00ffaa;
      --text: #e2eaf5;
      --muted: #5a7090;
      --user-bubble: #0f2040;
      --bot-bubble: #0a1928;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,18,0.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #001830, #003060);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(0,212,255,0.15));
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .logo-text p {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(0,255,170,0.2);
      background: rgba(0,255,170,0.05);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.08em;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,170,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(0,255,170,0); }
    }

    /* ── Messages ── */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 760px;
      width: 100%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.bot .msg-avatar {
      background: linear-gradient(135deg, #001830, #003060);
      border: 1px solid rgba(0,212,255,0.3);
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, #0f2040, #1a3060);
      border: 1px solid rgba(0,212,255,0.15);
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .message.user .msg-label { text-align: right; }

    .bubble {
      padding: 13px 18px;
      border-radius: 14px;
      font-size: 14.5px;
      line-height: 1.65;
      max-width: 520px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(0,212,255,0.15);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Quick replies ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
      position: relative;
      z-index: 1;
    }

    .qr-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .qr-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.05);
    }

    /* ── Input area ── */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(7,11,18,0.95);
      backdrop-filter: blur(12px);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.06);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 22px;
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #00eeff; transform: scale(1.05); }
    .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 16px; height: 16px; }

    .input-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 4px;
    }

    .input-meta span {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── API Key Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,11,18,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      max-width: 420px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #001830, #003060);
      border: 1px solid rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .modal h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text);
    }

    .modal p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal p a {
      color: var(--accent);
      text-decoration: none;
    }

    .modal input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: rgba(0,212,255,0.4); }
    .modal input::placeholder { color: var(--muted); }

    .modal-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .modal-btn:hover { background: #00eeff; }

    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ff6b6b;
      margin-top: 8px;
      display: none;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      #chat-box { padding: 20px 12px; }
      .input-area { padding: 12px 12px 16px; }
      .bubble { max-width: 280px; font-size: 14px; }
      .modal { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icon">🤖</div>
      <h2>Connect ARIA</h2>
      <p>Enter your Anthropic API key to activate the AI receptionist. Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
      <div class="error-msg" id="error-msg">❌ Invalid key or connection error. Try again.</div>
      <button class="modal-btn" onclick="startChat()">Activate ARIA →</button>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="avatar">🤖</div>
      <div class="logo-text">
        <h1>ARIA</h1>
        <p>AI Receptionist · weshytonnie-hub</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="dot"></div>
      Online
    </div>
  </header>

  <!-- Chat -->
  <div id="chat-box"></div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quick-replies" style="display:none">
    <button class="qr-btn" onclick="sendQuick('Who built you?')">Who built you?</button>
    <button class="qr-btn" onclick="sendQuick('What can you help me with?')">What can you help?</button>
    <button class="qr-btn" onclick="sendQuick('Tell me about this project')">About this project</button>
    <button class="qr-btn" onclick="sendQuick('How do I contact Weshytonnie?')">Contact info</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="Ask ARIA anything..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        disabled
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-meta">
      <span>Powered by Claude · Built by weshytonnie-hub</span>
      <span id="char-count">0 / 500</span>
    </div>
  </div>

  <script>
    let apiKey = '';
    let history = [];
    const SYSTEM_PROMPT = `You are ARIA (Artificial Receptionist & Intelligent Assistant), a professional and friendly AI receptionist built by Weshytonnie (GitHub: weshytonnie-hub), a developer based in Nairobi, Kenya.

Your role:
- Welcome visitors warmly and professionally
- Answer questions about Weshytonnie's skills: HTML, CSS, Java, C++
- Help with general inquiries and project questions
- Share contact info: weshytonnie@gmail.com
- Keep responses concise, warm, and professional
- Use light emojis to stay friendly but not overwhelming
- If asked technical questions outside your scope, suggest contacting Weshytonnie directly

Always introduce yourself as ARIA on first interaction.`;

    function startChat() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key.startsWith('sk-ant')) {
        document.getElementById('error-msg').style.display = 'block';
        return;
      }
      apiKey = key;
      document.getElementById('modal').style.display = 'none';
      document.getElementById('user-input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('quick-replies').style.display = 'flex';
      document.getElementById('user-input').focus();
      addMessage('bot', "Hello! 👋 I'm **ARIA**, the AI receptionist for Weshytonnie's profile. I'm here to help you learn about his work, skills, and how to get in touch. What can I help you with today?");
    }

    function addMessage(role, text) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatar = role === 'bot' ? '🤖' : '👤';
      const label = role === 'bot' ? 'ARIA' : 'You';

      // Basic markdown: **bold**
      const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      div.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-content">
          <span class="msg-label">${label}</span>
          <div class="bubble">${formatted}</div>
        </div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function showTyping() {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-content">
          <span class="msg-label">ARIA</span>
          <div class="bubble typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      input.value = '';
      autoResize(input);
      document.getElementById('char-count').textContent = '0 / 500';
      document.getElementById('send-btn').disabled = true;
      showTyping();

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 600,
            system: SYSTEM_PROMPT,
            messages: history
          })
        });

        const data = await res.json();
        removeTyping();

        if (data.error) throw new Error(data.error.message);

        const reply = data.content[0].text;
        history.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
      } catch (e) {
        removeTyping();
        addMessage('bot', "⚠️ Sorry, I ran into an issue connecting. Please check your API key or try again.");
      }

      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }

    function sendQuick(text) {
      document.getElementById('user-input').value = text;
      sendMessage();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      const len = el.value.length;
      document.getElementById('char-count').textContent = `${len} / 500`;
      if (len > 500) el.value = el.value.substring(0, 500);
    }

    // Enter in modal
    document.getElementById('api-key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startChat();
    });
  </script>
</body>
</html>
